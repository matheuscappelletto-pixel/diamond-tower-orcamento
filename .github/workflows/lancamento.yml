name: Diamond Tower — Lancamento XLSX

on:
  push:
    paths:
      - 'entradas/*.xlsx'
      - 'PF.xlsx'
      - 'main.py'
      - '.github/workflows/lancamento.yml'
  workflow_dispatch:

jobs:
  lancar-extrato:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install anthropic openpyxl

      - name: Garantir pastas
        run: |
          mkdir -p entradas
          mkdir -p processados

      - name: Executar automacao
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: python main.py

      - name: Commit de saida
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PF.xlsx processados/ entradas/
          git diff --cached --quiet || git commit -m "Processa extrato automaticamente"
          git push
