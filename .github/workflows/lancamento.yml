name: Diamond Tower — Lancamento Mensal

on:
  schedule:
    - cron: '0 13 5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lancar-extrato:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar lancamento
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
        run: python main.py

      - name: Commit e push automatico dos arquivos processados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add PF.xlsx entradas/ processados/ || true

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git commit -m "Processa extrato automaticamente"

          git pull --rebase origin main
          git push origin main
