name: Diamond Tower — Lancamento Mensal

on:
  schedule:
    - cron: '0 13 5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lancar-extrato:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar lancamento
        run: python main.py

      - name: Commit e push dos arquivos processados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add entradas/ processados/ PF.xlsx

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git commit -m "Processa extrato automaticamente"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Tentativa $i falhou, tentando novamente..."
            sleep 5
          done
